<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- Gradien Warna untuk Logo Modern -->
    <linearGradient id="kgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A2540;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#001122;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Lingkaran/Perisai Halus -->
  <rect width="500" height="500" rx="100" fill="url(#kgGrad)"/>
  
  <!-- Simbol Geometris K (Sisi Kiri) - Warna Emas KG -->
  <path d="M150 120 H210 V380 H150 Z" fill="#FFC000"/>
  <path d="M210 250 L310 120 H380 L260 250 Z" fill="#FFC000"/>
  <path d="M210 250 L270 250 L380 380 H310 Z" fill="#FFC000"/>
  
  <!-- Aksentuasi Kreatif Lingkaran Media (Sisi Kanan bawah) -->
  <circle cx="345" cy="250" r="35" fill="#F4F6F9" opacity="0.9"/>
</svg>
